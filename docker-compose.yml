services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: taskdb
      POSTGRES_USER: taskuser
      POSTGRES_PASSWORD: taskpass
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    # Correction: suppression de 'depends_on: backend' pour éviter la boucle de dépendance circulaire

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      # Correction: utilisation de 'db' au lieu de 'database' pour correspondre au nom du service
      DATABASE_URL: "postgres://taskuser:taskpass@db:5432/taskdb"
      # Ajout: REDIS_URL est requis par app.py pour la connexion au cache
      REDIS_URL: "redis://redis:6379/0"
    depends_on:
      - db
      - redis
    volumes:
      - ./backend:/app

  frontend:
    build: ./frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app

volumes:
  postgres_data:

